<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEO DropShip UG | Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="shop">
  <div class="topbar">🛒 Shop high-converting products for your dropshipping business</div>

  <header class="header">
    <a class="brand" href="index.html">MEO <span>DropShip</span></a>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>
    <button id="cartBtn" class="cart-btn" aria-label="Open cart">🛒 <span id="cartCount">0</span></button>
  </header>

  <main class="section">
    <div class="section-head">
      <h2>All Products</h2>
      <span class="muted">Find products to list today</span>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search products..." />
      <select id="categoryFilter">
        <option value="all">All categories</option>
      </select>
      <select id="sortSelect">
        <option value="featured">Sort: Featured</option>
        <option value="priceAsc">Price: Low to High</option>
        <option value="priceDesc">Price: High to Low</option>
        <option value="nameAsc">Name: A-Z</option>
      </select>
    </div>

    <div id="productList" class="grid"></div>

    <section class="admin" id="adminPanel">
      <div class="section-head"><h2>⚙️ Admin Product Manager</h2><span class="muted">Manage inventory quickly</span></div>
      <div class="admin-form">
        <input id="pname" type="text" placeholder="Product name" />
        <input id="pprice" type="number" placeholder="Price (UGX)" />
        <input id="pcategory" type="text" placeholder="Category" />
        <input id="pimg" type="text" placeholder="Image URL" />
        <button id="addProductBtn" class="btn primary" type="button">Add Product</button>
      </div>
      <div id="adminList" class="admin-list"></div>
    </section>
  </main>

  <aside id="cartDrawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <h3>🛍 Cart</h3>
      <button id="closeCart" class="icon-btn" type="button">✕</button>
    </div>
    <ul id="cartItems" class="cart-items"></ul>
    <p class="total">Total: UGX <span id="total">0</span></p>
    <div class="checkout">
      <input id="custName" type="text" placeholder="Customer name" />
      <input id="phone" type="text" placeholder="Phone number" />
      <input id="location" type="text" placeholder="Delivery location" />
      <select id="payment">
        <option value="">Payment method</option>
        <option value="Mobile Money">Mobile Money</option>
        <option value="Cash on Delivery">Cash on Delivery</option>
      </select>
      <button id="checkoutBtn" class="btn success" type="button">Checkout via WhatsApp</button>
    </div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <footer class="footer">
    <p>© 2026 MEO DropShip UG • Sell smarter, fulfill faster.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
