<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftCart UG | Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-banner">🔥 Hot products updated daily for your online store</div>

  <header class="site-header">
    <a class="brand" href="index.html">SwiftCart <span>UG</span></a>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="container section-space">
    <section class="shop-toolbar">
      <input type="text" id="searchInput" placeholder="Search products..." oninput="applyFilters()" />
      <select id="categoryFilter" onchange="applyFilters()">
        <option value="all">All categories</option>
      </select>
      <select id="sortBy" onchange="applyFilters()">
        <option value="default">Sort: Default</option>
        <option value="price-asc">Price: Low to high</option>
        <option value="price-desc">Price: High to low</option>
        <option value="name-asc">Name: A-Z</option>
      </select>
    </section>

    <div class="section-header">
      <h2>All Products</h2>
      <span class="muted" id="productMeta">0 items</span>
    </div>
    <div class="products" id="product-list"></div>

    <section class="admin">
      <div class="admin-header">
        <h3>Admin Dashboard</h3>
        <span class="muted">Add, edit, and delete products</span>
      </div>

      <div class="admin-form-grid">
        <input type="text" id="pname" placeholder="Product name" />
        <input type="number" id="pprice" placeholder="Price" />
      </div>
      <div class="admin-form-grid">
        <input type="text" id="pimg" placeholder="Image URL" />
        <input type="text" id="pcategory" placeholder="Category (e.g. Gadgets)" />
      </div>
      <div class="admin-action-row">
        <button id="saveProductBtn" onclick="addProduct()">Add Product</button>
        <button id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()" style="display:none;">Cancel Edit</button>
      </div>

      <div class="admin-list" id="adminProductList"></div>
    </section>
  </main>

  <button id="cartButton" onclick="toggleCart(event)">🛒 Cart <span id="cartCount">0</span></button>

  <aside id="cart">
    <h3>Your Cart</h3>
    <ul id="cart-items"></ul>
    <p class="cart-total">Total: UGX <span id="total">0</span></p>

    <h4>Checkout Details</h4>
    <input type="text" id="custName" placeholder="Full name" />
    <input type="text" id="phone" placeholder="Phone number" />
    <input type="text" id="location" placeholder="Delivery location" />
    <select id="payment">
      <option value="">Payment method</option>
      <option value="Mobile Money">Mobile Money</option>
      <option value="Cash on Delivery">Cash on Delivery</option>
    </select>

    <button id="orderBtn" onclick="checkoutWhatsApp()">Order via WhatsApp</button>
  </aside>

  <footer>
    <p>SwiftCart UG • Built for modern online selling</p>
    <p>WhatsApp Support: +256748348839</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
